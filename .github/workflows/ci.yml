name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the package (no runtime dependencies)
        run: pip install -e .

      - name: Install pytest
        run: pip install pytest

      - name: Run tests with unittest (zero deps beyond the package itself)
        run: python -m unittest discover -s tests -t . -v

      - name: Run tests with pytest
        run: pytest -v

      - name: Smoke-test the CLI end to end
        run: |
          toolsmell --list-rules
          toolsmell examples/weather-tool-clean.json --max-score 50
          toolsmell examples/weather-tool-smelly.json --json --max-score 1000

  # Everything in this repo has to read like a person wrote it, comments and
  # docs included. noslop's code mode scores each source file for
  # machine-writing tells and fails at 10/100 lines. Pinned so a rules
  # update in noslop can't redden CI on its own; bump deliberately.
  noslop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: pip install noslop-lint==0.10.0
      - name: Source files read human (code mode)
        run: |
          git ls-files -z 'toolsmell/*.py' 'toolsmell/rules/*.py' 'tests/*.py' \
            '.github/workflows/*.yml' \
            | xargs -0r noslop --no-config
      - name: Docs read human (prose mode)
        run: git ls-files -z '*.md' | xargs -0r noslop --no-config
