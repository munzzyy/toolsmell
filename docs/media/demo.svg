<text x="108.6" y="158" fill="#abb2bf" font-weight="normal" xml:space="preserve"> Vague action verb with no specifics  [TS-004]</text>
<text x="16.0" y="177" fill="#abb2bf" font-weight="normal" xml:space="preserve">          &#x27;run&#x27; description is just &#x27;does stuff&#x27; -- a vague verb with nothing about what it acts</text>
